name: Update EMS Roster

on:
  schedule:
    # Run at noon UTC on the 16th of each month (data updates on 15th)
    - cron: '0 12 16 * *'
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write

jobs:
  update-roster:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pdfplumber pytest

      - name: Set date variable
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Download EMS Roster PDF
        run: |
          curl -L -o "pdfs/ems_roster_${{ steps.date.outputs.date }}.pdf" \
            "https://dhhs.ne.gov/licensure/Documents/EMS_Roster.pdf"

      - name: Extract data from PDF
        run: |
          python parse_ems_roster.py \
            "pdfs/ems_roster_${{ steps.date.outputs.date }}.pdf" \
            -o "data/ems_roster_${{ steps.date.outputs.date }}.csv" \
            --date "${{ steps.date.outputs.date }}"

      - name: Run tests to validate extracted data
        run: pytest test_parse_ems_roster.py -v

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdfs/ data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update EMS roster for ${{ steps.date.outputs.date }}"
            git push
          fi
